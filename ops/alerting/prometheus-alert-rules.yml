groups:
  - name: gueinsight-api
    rules:
      - alert: GueInsightHigh5xxRate
        expr: |
          sum(rate(gueinsight_http_requests_total{status_code=~"5.."}[5m]))
          /
          clamp_min(sum(rate(gueinsight_http_requests_total[5m])), 0.001) > 0.05
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error ratio on gueInsight API"
          description: "More than 5% of HTTP traffic returns 5xx for 10m"

      - alert: GueInsightP95LatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(gueinsight_http_request_duration_seconds_bucket[5m]))
          ) > 1.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "P95 latency above 1.5s"
          description: "Investigate slow endpoints and downstream dependencies"
