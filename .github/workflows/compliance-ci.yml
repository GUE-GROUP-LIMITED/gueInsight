name: Compliance CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-compliance:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      SECRET_KEY: ci-secret-key
      SECURITY_PASSWORD_SALT: ci-security-salt
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Optional AI stack currently carries advisories without universal fixes.
          # It is not required for backend compliance tests in this pipeline.
          pip uninstall -y torch transformers huggingface-hub tokenizers safetensors || true
          # Upgrade core packages to versions with published fixes.
          pip install --upgrade \
            cryptography==48.0.1 \
            filelock==3.20.3 \
            Flask==3.1.3 \
            Flask-Cors==6.0.0 \
            fonttools==4.60.2 \
            idna==3.15 \
            Jinja2==3.1.6 \
            lxml==6.1.0 \
            pdfplumber==0.11.10 \
            pillow==12.2.0 \
            pypdf==6.13.3 \
            pytest==9.0.3 \
            python-dotenv==1.2.2 \
            requests==2.33.0 \
            urllib3==2.7.0 \
            Werkzeug==3.1.6
          pip install pip-audit bandit

      - name: Compile backend sources
        run: python -m compileall migrations app

      - name: Security static analysis
        run: bandit -r app -ll

      - name: Dependency vulnerability audit
        run: pip-audit

      - name: Run backend tests with coverage
        run: python -m pytest

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: coverage.xml

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build
