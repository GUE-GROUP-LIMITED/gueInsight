<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Report</title>

    <!-- Google Fonts for custom fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS for responsive design -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet">

    <!-- Add your custom styles -->
    <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Generate Report</h1>
        <a href="{{ url_for('dashboard') }}">Back to Dashboard</a> | 
        <a href="{{ url_for('logout') }}">Logout</a>
    </header>

    <section>
        <h2>Report Details</h2>
        <!-- If results exist, display them here -->
        {% if results %}
            <h3>Report Summary</h3>
            <p>{{ results.status }}: {{ results.message }}</p>
            <!-- Display other relevant report data -->
        {% else %}
            <p>No report available yet.</p>
        {% endif %}

        <form action="{{ url_for('send_results', filename='report') }}" method="get">
            <button type="submit">Send Report via Email</button>
        </form>
    </section>

    <!-- Footer -->
<footer class="bg-dark text-white text-center p-3">
    <div class="container">
        <!-- Brand and Links -->
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-center">
            <p class="mb-2 mb-md-0">&copy; 2024 Gue Cyber Labs. All Rights Reserved.</p>
            <ul class="list-inline mb-0">
                <li class="list-inline-item">
                    <a href="#" class="text-white text-decoration-none">Privacy Policy</a>
                </li>
                <li class="list-inline-item">
                    <a href="#" class="text-white text-decoration-none">Terms of Service</a>
                </li>
                <li class="list-inline-item">
                    <a href="#" class="text-white text-decoration-none">Contact Us</a>
                </li>
            </ul>
        </div>

        <!-- Social Media Icons -->
        <div class="mt-3">
            <a href="#" class="text-white me-2">
                <i class="bi bi-facebook"></i>
            </a>
            <a href="#" class="text-white me-2">
                <i class="bi bi-twitter"></i>
            </a>
            <a href="#" class="text-white me-2">
                <i class="bi bi-linkedin"></i>
            </a>
            <a href="#" class="text-white">
                <i class="bi bi-github"></i>
            </a>
        </div>
    </div>
</footer>

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">


</body>
</html>
