<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>

    <!-- Google Fonts for custom fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS for responsive design -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
    <a class="navbar-brand" href="{{ url_for('index') }}">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="GueInsight Logo" height="40" class="d-inline-block align-text-top">
        </a>
    <div class="container mt-5">
        <h1>Admin Login</h1>
        <form method="POST" action="{{ url_for('admin.admin_login') }}">
            {{ form.hidden_tag() }}  <!-- Use 'form' instead of 'AdminLoginForm' -->
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="Enter email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
         <!-- Sign Up Link -->
        <p class="text-center mt-3">
            Don't have an account? <a href="{{ url_for('admin.admin_signup') }}">Sign Up</a>
        </p>
    </div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3">
    <div class="container">
        <!-- Brand and Links -->
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-center">
            <p class="mb-2 mb-md-0">&copy; 2024 Gue Cyber Labs. All Rights Reserved.</p>
            <ul class="list-inline mb-0">
                <li class="list-inline-item">
                    <a href="#" class="text-white text-decoration-none">Privacy Policy</a>
                </li>
                <li class="list-inline-item">
                    <a href="#" class="text-white text-decoration-none">Terms of Service</a>
                </li>
                <li class="list-inline-item">
                    <a href="#" class="text-white text-decoration-none">Contact Us</a>
                </li>
            </ul>
        </div>

        <!-- Social Media Icons -->
        <div class="mt-3">
            <a href="#" class="text-white me-2">
                <i class="bi bi-facebook"></i>
            </a>
            <a href="#" class="text-white me-2">
                <i class="bi bi-twitter"></i>
            </a>
            <a href="#" class="text-white me-2">
                <i class="bi bi-linkedin"></i>
            </a>
            <a href="#" class="text-white">
                <i class="bi bi-github"></i>
            </a>
        </div>
    </div>
</footer>

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.min.js"></script>

</body>
</html>
