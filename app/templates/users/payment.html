<form id="payment-form">
    <div id="card-element">
        <!-- A Stripe Element will be inserted here. -->
    </div>

    <!-- Used to display form errors. -->
    <div id="card-errors" role="alert"></div>

    <button id="submit">Submit Payment</button>
</form>

<script src="https://js.stripe.com/v3/"></script>
<script>
    var stripe = Stripe('your-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_key-key'); // Replace with your Stripe publishable key
    var elements = stripe.elements();
    var card = elements.create('card');
    card.mount('#card-element');

    var form = document.getElementById('payment-form');

    form.addEventListener('submit', async function (event) {
        event.preventDefault();

        var {paymentIntent, error} = await stripe.confirmCardPayment(
            '{{ client_secret }}', {
                payment_method: {
                    card: card,
                    billing_details: {
                        name: '{{ current_user.first_name }} {{ current_user.last_name }}',
                    },
                },
            });

        if (error) {
            var errorMessage = error.message;
            document.getElementById('card-errors').textContent = errorMessage;
        } else {
            // Successfully confirmed the payment, send the payment_intent_id and payment_method_id
            var form = document.createElement('form');
            form.method = 'POST';
            form.action = '{{ url_for("confirm_subscription") }}';

            var payment_intent_id = document.createElement('input');
            payment_intent_id.name = 'payment_intent_id';
            payment_intent_id.value = paymentIntent.id;
            form.appendChild(payment_intent_id);

            var payment_method_id = document.createElement('input');
            payment_method_id.name = 'payment_method_id';
            payment_method_id.value = paymentIntent.payment_method;
            form.appendChild(payment_method_id);

            var plan_type = document.createElement('input');
            plan_type.name = 'plan_type';
            plan_type.value = '{{ plan_type }}';
            form.appendChild(plan_type);

            document.body.appendChild(form);
            form.submit();
        }
    });
</script>
