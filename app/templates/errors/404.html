<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Found</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 600px; padding: 60px 40px; text-align: center; }
        h1 { color: #f39c12; font-size: 72px; margin-bottom: 20px; }
        h2 { color: #333; font-size: 28px; margin-bottom: 20px; font-weight: 600; }
        p { color: #666; font-size: 16px; line-height: 1.6; margin-bottom: 30px; }
        .button { display: inline-block; padding: 12px 30px; background: #667eea; color: white; text-decoration: none; border-radius: 6px; font-weight: 600; margin-top: 20px; transition: background 0.3s; }
        .button:hover { background: #764ba2; }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>
            Sorry, the page you're looking for doesn't exist. 
            It may have been moved or deleted.
        </p>
        <a href="/" class="button">Go Home</a>
    </div>
</body>
</html>
